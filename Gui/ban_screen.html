<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ban Screen</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        #banContainer {
            text-align: center;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .warning-icon {
            font-size: 50px;
            color: yellow;
        }
    </style>
</head>
<body>
    <div id="banContainer">
        <div class="warning-icon">⚠️</div>
        <h1>YOUR ACCOUNT IS BLOCKED</h1>
        <p><b>Admin Name:</b> <span id="adminName"></span></p>
        <p><b>Reason:</b> <span id="reason"></span></p>
        <p><b>Last days left:</b> <span id="daysLeft"></span></p>
        <p><b>Date of blocking:</b> <span id="banDate"></span></p>
    </div>

    <script>
        function showBanScreen(adminName, reason, daysLeft, banDate) {
            document.getElementById('adminName').textContent = adminName;
            document.getElementById('reason').textContent = reason;
            document.getElementById('daysLeft').textContent = daysLeft;
            document.getElementById('banDate').textContent = banDate;
        }
    </script>
</body>
</html>
